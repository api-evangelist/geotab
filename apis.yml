- aid: geotab:data-intake-gateway
  name: Data Intake Gateway API
  type: REST
  description: 'The Geotab Data Intake Gateway (DIG) API accepts telematics records
    from third-party devices directly into the MyGeotab platform. It uses JWT bearer
    token authentication and supports 12 distinct record types including GPS, acceleration,
    fault codes, driver changes, and VIN data.

    '
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://github.com/Geotab/data-intake-gateway
  baseURL: https://dig.geotab.com
