created: 2026-06-12
modified: 2026-06-12
specificationVersion: '0.19'
description: 'Geotab is a fleet telematics platform providing the MyGeotab SDK and
  REST API for vehicle tracking, driver behavior monitoring, fuel management, ELD
  compliance, and route optimization. The MyGeotab API uses JSON-RPC 2.0 over HTTPS
  with session-token authentication, exposing a single versioned endpoint at /apiv1
  that supports Get, Add, Set, and Remove operations across all fleet entities including
  devices, trips, fault data, and status data. The MyAdmin API provides reseller and
  partner access to manage databases, orders, and provisioning. Native SDK clients
  are available for JavaScript, .NET, Java, and Python, and the full SDK and sample
  code are published on GitHub.

  '
tags:
- Fleet Management
- Telematics
- Vehicle Tracking
- ELD Compliance
- Driver Behavior
- Fuel Monitoring
- Route Optimization
- GPS Tracking
- IoT
apis:
- aid: geotab:mygeotab-api
  name: MyGeotab API
  type: REST
  description: 'The MyGeotab API provides JSON-RPC 2.0 access to all fleet telematics
    data including vehicle location, trip history, driver behavior, fault codes, fuel
    usage, HOS/ELD compliance records, and sensor data. It supports GetFeed for real-time
    data streaming and batch retrieval operations.

    '
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.geotab.com/myGeotab/introduction/
  baseURL: https://my.geotab.com/apiv1
  tags:
  - Fleet Telematics
  - Vehicle Data
  - GPS
  - ELD
  properties:
